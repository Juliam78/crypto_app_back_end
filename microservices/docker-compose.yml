# CryptoApp - Arquitectura de microservicios
# Una base de datos PostgreSQL por servicio + API Gateway (YARP).
# Levantar todo: docker compose up --build

services:
  # ---------------- Bases de datos (una por servicio) ----------------
  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cryptoapp_auth
    ports: ["5433:5432"]
    volumes: ["auth-db-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cryptoapp_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  market-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cryptoapp_market
    ports: ["5434:5432"]
    volumes: ["market-db-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cryptoapp_market"]
      interval: 5s
      timeout: 5s
      retries: 10

  portfolio-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cryptoapp_portfolio
    ports: ["5435:5432"]
    volumes: ["portfolio-db-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cryptoapp_portfolio"]
      interval: 5s
      timeout: 5s
      retries: 10

  trading-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cryptoapp_trading
    ports: ["5436:5432"]
    volumes: ["trading-db-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cryptoapp_trading"]
      interval: 5s
      timeout: 5s
      retries: 10

  admin-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cryptoapp_admin
    ports: ["5437:5432"]
    volumes: ["admin-db-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cryptoapp_admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------- Microservicios ----------------
  auth-service:
    build: ./src/AuthService
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=auth-db;Port=5432;Database=cryptoapp_auth;Username=postgres;Password=postgres"
      PublicBaseUrl: "http://localhost:8080"
      Auth__TokenSecret: "cambia-esta-clave-secreta-en-produccion-cryptoapp-2026"
    ports: ["8081:8080"]
    # Avatares persistidos fuera del contenedor para que sobrevivan a reconstrucciones.
    volumes:
      - auth-avatars:/app/wwwroot/avatars
    depends_on:
      auth-db:
        condition: service_healthy

  market-service:
    build: ./src/MarketService
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=market-db;Port=5432;Database=cryptoapp_market;Username=postgres;Password=postgres"
      CoinGecko__ApiKey: ""
    ports: ["8082:8080"]
    depends_on:
      market-db:
        condition: service_healthy

  portfolio-service:
    build: ./src/PortfolioService
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=portfolio-db;Port=5432;Database=cryptoapp_portfolio;Username=postgres;Password=postgres"
    ports: ["8083:8080"]
    depends_on:
      portfolio-db:
        condition: service_healthy

  trading-service:
    build: ./src/TradingService
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=trading-db;Port=5432;Database=cryptoapp_trading;Username=postgres;Password=postgres"
    ports: ["8084:8080"]
    depends_on:
      trading-db:
        condition: service_healthy

  admin-service:
    build: ./src/AdminService
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=admin-db;Port=5432;Database=cryptoapp_admin;Username=postgres;Password=postgres"
    ports: ["8085:8080"]
    depends_on:
      admin-db:
        condition: service_healthy

  # ---------------- API Gateway ----------------
  gateway:
    build: ./src/ApiGateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports: ["8080:8080"]
    depends_on:
      - auth-service
      - market-service
      - portfolio-service
      - trading-service
      - admin-service

volumes:
  auth-db-data:
  market-db-data:
  portfolio-db-data:
  trading-db-data:
  admin-db-data:
  auth-avatars:
